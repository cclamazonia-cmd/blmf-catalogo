<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BLMF — Catálogo</title>
  <style>
    :root {
      --bg:#0e0f12;
      --panel:#14161b;
      --text:#f1f1f1;
      --muted:#b8bcc7;
      --line:#2a2e39;
      --red:#d1001f;
      --white:#ffffff;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --radius: 16px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(1100px 800px at 20% 0%, rgba(209,0,31,.18), transparent 60%),
                  radial-gradient(900px 700px at 90% 15%, rgba(255,255,255,.08), transparent 55%),
                  var(--bg);
      color: var(--text);
      font-family: var(--sans);
      line-height: 1.35;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(10px);
      background: rgba(14,15,18,.72);
      border-bottom: 1px solid var(--line);
    }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 16px; }
    .brand {
      display:flex; gap:12px; align-items:center;
    }
    .mark {
      width: 42px; height: 42px; border-radius: 999px;
      border: 2px solid var(--white);
      display:grid; place-items:center;
      box-shadow: var(--shadow);
    }
    .mark svg { width: 28px; height: 28px; }
    h1 {
      font-size: 18px; margin: 0;
      letter-spacing: .2px;
    }
    .sub {
      margin: 2px 0 0 0;
      color: var(--muted);
      font-size: 13px;
    }
    .toolbar {
      display:grid;
      grid-template-columns: 1.3fr .7fr .7fr .7fr auto;
      gap: 10px;
      margin-top: 14px;
    }
    @media (max-width: 880px){
      .toolbar { grid-template-columns: 1fr 1fr; }
    }
    input, select, button {
      width: 100%;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(20,22,27,.9);
      color: var(--text);
      outline: none;
    }
    input::placeholder { color: #8e94a3; }
    button {
      cursor: pointer;
      background: linear-gradient(180deg, rgba(209,0,31,.95), rgba(160,0,22,.95));
      border-color: rgba(209,0,31,.55);
      font-weight: 700;
      letter-spacing: .2px;
      white-space: nowrap;
    }
    button:active { transform: translateY(1px); }
    main .panel {
      margin: 16px auto 26px;
      background: rgba(20,22,27,.75);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .meta {
      display:flex; justify-content:space-between; align-items:center;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      gap: 12px;
      flex-wrap: wrap;
    }
    .meta .kpi {
      font-family: var(--mono);
      font-size: 12px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(0,0,0,.18);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    thead th {
      text-align: left;
      font-size: 12px;
      letter-spacing: .4px;
      text-transform: uppercase;
      color: var(--muted);
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(0,0,0,.12);
      position: sticky;
      top: 142px;
      z-index: 5;
    }
    @media (max-width: 880px){
      thead th { top: 214px; }
    }
    tbody td {
      padding: 12px 14px;
      border-bottom: 1px solid rgba(42,46,57,.65);
      vertical-align: top;
    }
    tbody tr:hover { background: rgba(255,255,255,.04); }
    .title { font-weight: 700; }
    .muted { color: var(--muted); font-size: 13px; }
    .tag {
      display:inline-flex; align-items:center;
      font-family: var(--mono);
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(0,0,0,.14);
      margin-right: 6px;
    }
    a {
      color: var(--white);
      text-decoration: none;
      border-bottom: 1px dotted rgba(255,255,255,.3);
    }
    a:hover { border-bottom-color: rgba(255,255,255,.75); }
    .small { font-size: 12px; }
    footer {
      color: var(--muted);
      padding: 16px;
      text-align: center;
      font-size: 12px;
    }
  </style>
</head>

<header>

      <button id="exportCsv" title="Exportar os resultados filtrados em CSV">Exportar CSV</button>

  </div>
</header>

<main class="wrap">
  <div class="panel">
    <div class="meta">
      <div class="kpi" id="kpiTotal">—</div>
      <div class="kpi" id="kpiFiltered">—</div>
      <div class="kpi" id="kpiWithPdf">—</div>
    </div>

    <div style="overflow:auto; max-height: 70vh;">
      <table>
        <thead>
          <tr>
            <th style="min-width: 320px;">Título</th>
            <th style="min-width: 210px;">Autor</th>
            <th style="min-width: 90px;">Ano</th>
            <th style="min-width: 220px;">Editora</th>
            <th style="min-width: 120px;">ISBN</th>
            <th style="min-width: 140px;">Exemplares</th>
            <th style="min-width: 130px;">Arquivo</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>
</main>

<footer>
  Dica: para que os links de PDF funcionem, mantenha a pasta <span class="tag">single/</span> ao lado deste <span class="tag">index.html</span>.

  // ============
  // UTIL
  // ============
  const norm = (s) => (s || "")
    .toString()
    .normalize("NFD")
    .replace(/\p{Diacritic}/gu, "")
    .toLowerCase()
    .trim();

  function uniq(arr) {
    return Array.from(new Set(arr.filter(Boolean)));
  }

  function escapeHtml(s) {
    return (s || "").replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]));
  }

  function toCsv(rows) {
    const cols = ["title","author","year","publisher","place","isbn","lang","copies","download"];
    const header = cols.join(",");
    const lines = rows.map(r => cols.map(k => {
      const v = (r[k] ?? "").toString().replace(/"/g,'""');
      return `"${v}"`;
    }).join(","));
    return [header, ...lines].join("\n");
  }

  // ============
  // UI INIT
  // ============
  const elQ = document.getElementById("q");
  const elLang = document.getElementById("lang");
  const elYear = document.getElementById("year");
  const elHasFile = document.getElementById("hasFile");
  const elRows = document.getElementById("rows");
  const elTotal = document.getElementById("kpiTotal");
  const elFiltered = document.getElementById("kpiFiltered");
  const elWithPdf = document.getElementById("kpiWithPdf");

  const langs = uniq(CATALOG.map(r => r.lang)).sort();
  langs.forEach(l => {
    const opt = document.createElement("option");
    opt.value = l;
    opt.textContent = l;
    elLang.appendChild(opt);
  });

  const years = uniq(CATALOG.map(r => r.year).filter(y => /^\d{4}$/.test(y))).sort((a,b)=>b.localeCompare(a));
  years.forEach(y => {
    const opt = document.createElement("option");
    opt.value = y;
    opt.textContent = y;
    elYear.appendChild(opt);
  });

  elTotal.textContent = `Registros: ${CATALOG.length}`;
  const withPdfCount = CATALOG.filter(r => !!r.download).length;
  elWithPdf.textContent = `Com PDF: ${withPdfCount}`;

  // ============
  // RENDER
  // ============
  function render() {
    const q = norm(elQ.value);
    const lang = elLang.value;
    const year = elYear.value;
    const hasFile = elHasFile.value;

    const filtered = CATALOG.filter(r => {
      if (lang && r.lang !== lang) return false;
      if (year && r.year !== year) return false;
      if (hasFile === "1" && !r.download) return false;
      if (hasFile === "0" && r.download) return false;

      if (!q) return true;

      const blob = norm([r.title, r.author, r.publisher, r.place, r.isbn].join(" | "));
      return blob.includes(q);
    });

    elFiltered.textContent = `Filtrados: ${filtered.length}`;

    const rowsHtml = filtered.map(r => {
      const title = escapeHtml(r.title || "—");
      const author = escapeHtml(r.author || "—");
      const publisher = escapeHtml(r.publisher || "—");
      const isbn = escapeHtml(r.isbn || "—");
      const year = escapeHtml(r.year || "—");
      const copies = Number.isFinite(r.copies) ? r.copies : "—";

      const fileCell = r.download
        ? `<a class="small" href="${encodeURI(r.download)}" download>${escapeHtml(r.download_name || "PDF")}</a>`
        : `<span class="muted small">—</span>`;

      return `
        <tr>
          <td>
            <div class="title">${title}</div>
            <div class="muted small">${escapeHtml(r.place || "")}${r.place && r.lang ? " • " : ""}${escapeHtml(r.lang || "")}</div>
          </td>
          <td>${author}</td>
          <td><span class="tag">${year}</span></td>
          <td>${publisher}</td>
          <td><span class="muted">${isbn}</span></td>
          <td><span class="tag">${copies} ex.</span></td>
          <td>${fileCell}</td>
        </tr>
      `;
    }).join("");

    elRows.innerHTML = rowsHtml || `<tr><td colspan="7" class="muted">Nenhum resultado.</td></tr>`;

    // expose for export
    window.__BLMF_FILTERED__ = filtered;
  }

  ["input","change"].forEach(evt => {
    elQ.addEventListener(evt, render);
    elLang.addEventListener(evt, render);
    elYear.addEventListener(evt, render);
    elHasFile.addEventListener(evt, render);
  });

  document.getElementById("exportCsv").addEventListener("click", () => {
    const filtered = window.__BLMF_FILTERED__ || CATALOG;
    const csv = toCsv(filtered);
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "blmf_catalogo_filtrado.csv";
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  });

  render();
</script>
