<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BLMF — Catálogo</title>

  <style>
    :root{
      --panel:rgba(18,18,18,.96);
      --text:#f2f2f2; --muted:rgba(255,255,255,.72);
      --red:#b30018; --red2:#e11d2f;
      --line:rgba(255,255,255,.10);
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --ok:#4ade80; --warn:#fbbf24; --bad:#fb7185;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;color:var(--text);font-family:Inter, Segoe UI, Arial, sans-serif;}
    body{
      background-image:
        linear-gradient(rgba(0,0,0,0.78), rgba(0,0,0,0.78)),
        url('https://cclamazonia.noblogs.org/files/2024/11/Arte-CCLA-paredao.jpg');
      background-size:cover; background-position:center; background-attachment:fixed; background-repeat:no-repeat;
    }
    a, a:visited{color:inherit}

    .wrap{max-width:1320px;margin:0 auto;padding:24px}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px}
    .brand{display:flex;align-items:center;gap:12px}
    .logo{height:64px;width:auto;max-width:140px;object-fit:contain;display:block;flex-shrink:0;filter:drop-shadow(0 8px 18px rgba(0,0,0,.35))}

    .btn{
      border:1px solid var(--line); background:rgba(18,18,18,.92);
      color:var(--text); border-radius:14px; padding:10px 12px;
      cursor:pointer; box-shadow: var(--shadow);
      font-weight:900; font-size:.95rem;
    }
    .btn.primary{border:none;background:linear-gradient(135deg,var(--red2),var(--red))}
    .btn:hover{border-color:rgba(255,255,255,.22)}

    .hero{
      border:1px solid rgba(255,255,255,.08);
      background:linear-gradient(135deg, rgba(179,0,24,.95), rgba(90,0,12,.96));
      border-radius:22px;padding:18px;box-shadow:var(--shadow);margin-bottom:16px
    }
    .hero h1{margin:0 0 6px;font-size:1.55rem}
    .hero p{margin:0;color:rgba(255,255,255,.92)}

    .toolbar{
      display:grid;
      grid-template-columns: 1.2fr .8fr .8fr auto auto auto;
      gap:12px;
      margin-bottom:14px;
    }
    @media (max-width:980px){.toolbar{grid-template-columns:1fr 1fr}}
    @media (max-width:640px){.toolbar{grid-template-columns:1fr}}

    .input, .select{
      width:100%;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(12,12,12,.75);
      color:var(--text);
      border-radius:14px;
      padding:12px 12px;
      outline:none;
      box-shadow: var(--shadow);
    }
    .input:focus, .select:focus{border-color:rgba(225,29,47,.85); box-shadow:0 0 0 3px rgba(225,29,47,.18)}

    .card{border:1px solid rgba(255,255,255,.08); background:var(--panel); border-radius:22px; padding:0; box-shadow:var(--shadow); overflow:hidden}
    .tableWrap{overflow:auto;max-height:72vh}
    table{width:100%;border-collapse:separate;border-spacing:0;min-width:1060px;background:rgba(10,10,10,.35)}
    thead th{
      position:sticky;top:0;z-index:2;text-align:left;padding:12px 14px;
      background:linear-gradient(180deg,#26060a,#160407);color:#fff;border-bottom:1px solid rgba(255,255,255,.08);
      font-size:.86rem;text-transform:uppercase;letter-spacing:.05em;
    }
    tbody td{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.06);vertical-align:top}
    tbody tr:hover td{background:rgba(179,0,24,.08)}

    .muted{color:var(--muted)}
    .status{margin-top:10px;font-size:.92rem}
    .status.ok{color:var(--ok)} .status.warn{color:var(--warn)} .status.bad{color:var(--bad)}

    .btnMini{
      border:1px solid rgba(255,255,255,.12);
      background:rgba(18,18,18,.92);
      color:var(--text);
      border-radius:12px;
      padding:7px 10px;
      cursor:pointer;
      font-weight:900;
      font-size:.84rem;
      margin-right:8px;
      white-space:nowrap;
    }
    .btnMini:hover{border-color:rgba(255,255,255,.22)}

    .book-link{
      color:var(--text);
      text-decoration:none;
      font-weight:900;
      border-bottom:1px solid transparent;
    }
    .book-link:hover{border-bottom-color:rgba(255,255,255,.35)}
    .book-link:visited{color:var(--text)}

    mark{background: rgba(225,29,47,.35); color:#fff; padding:0 2px; border-radius:4px;}

    @media print{
      body{background:#fff;color:#000}
      .topbar,.hero,.toolbar,.status{display:none !important}
      .card{border:none;box-shadow:none}
      table{min-width:auto}
      thead th{position:static}
    }
  </style>
</head>
<body>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    // ⚠️ Anti-parasite: on réécrit le body dès le chargement du module.
    // Ça élimine n'importe quel texte/tableau collé par erreur dans le body.
    document.body.innerHTML = `
      <div class="wrap" id="app">
        <div class="topbar">
          <div class="brand">
            <img class="logo" src="logo-blmf.png" alt="BLMF"
              onerror="this.style.display='none'; const f=document.getElementById('logoFallback'); if(f) f.style.display='block';" />
            <div id="logoFallback" style="display:none">
              <div style="font-weight:900;letter-spacing:.04em">BLMF</div>
              <div class="muted" style="font-size:.86rem">Biblioteca Libertária Maxwell Ferreira</div>
            </div>
          </div>
          <div style="display:flex;gap:10px;flex-wrap:wrap">
            <button class="btn" id="btnBlog" type="button">Voltar ao blogue</button>
            <button class="btn" id="btnConta" type="button">Minha conta</button>
            <button class="btn primary" id="btnEntrar" type="button">Entrar</button>
          </div>
        </div>

        <div class="hero">
          <h1>Catálogo da BLMF</h1>
          <p>Busca, filtro e acesso às fichas. Para reservar, entra na tua conta.</p>
        </div>

        <div class="toolbar">
          <input class="input" id="q" placeholder="Buscar por título, autor, editora, referência…" />
          <select class="select" id="sort">
            <option value="title_asc">Ordenar: Título (A→Z)</option>
            <option value="title_desc">Ordenar: Título (Z→A)</option>
            <option value="author_asc">Ordenar: Autor (A→Z)</option>
            <option value="author_desc">Ordenar: Autor (Z→A)</option>
            <option value="year_desc">Ordenar: Ano (novo→antigo)</option>
            <option value="year_asc">Ordenar: Ano (antigo→novo)</option>
          </select>
          <input class="input" id="ref" placeholder="Filtrar por ref (ex.: 0000124)" />
          <button class="btn" id="btnLimpar" type="button">Limpar</button>
          <button class="btn" id="btnExportPdf" type="button">Exportar PDF</button>
          <button class="btn" id="btnRecarregar" type="button">Recarregar</button>
        </div>

        <div class="card">
          <div class="tableWrap">
            <table>
              <thead>
                <tr>
                  <th>Ref</th>
                  <th>Título</th>
                  <th>Autor</th>
                  <th>Ano</th>
                  <th>Editora</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody id="tbody">
                <tr><td colspan="6" class="muted">Carregando…</td></tr>
              </tbody>
            </table>
          </div>
        </div>

        <div class="status" id="status"></div>
      </div>
    `;

    const ROUTES = {
      BLOG_HOME: "https://cclamazonia.noblogs.org/",
      CATALOGO: "https://cclamazonia.github.io/blmf-catalogo/index.html",
      LIVRO: "https://cclamazonia.github.io/blmf-catalogo/livro.html",
      CADASTRO: "https://cclamazonia.github.io/blmf-conta/cadastro.html",
      CONTA: "https://cclamazonia.github.io/blmf-conta/conta.html",
    };

    const SUPABASE_URL = "https://asptfmokzykwzlshsncw.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFzcHRmbW9renlrd3psc2hzbmN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MzcxNzcsImV4cCI6MjA4ODExMzE3N30.JkMLHPCV2AH5ELZV_1RfcoW250QEofLGvnDKSDpkcn0";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
    });

    const $ = (id) => document.getElementById(id);
    const setStatus = (msg, cls) => {
      const el = $("status");
      el.className = "status" + (cls ? " " + cls : "");
      el.textContent = msg || "";
    };

    // petits marqueurs pour vérifier que tu as bien la bonne version déployée
    console.log("BLMF CATALOGO — index.html v2026-03-05-clean");

    $("btnBlog").addEventListener("click", () => location.assign(ROUTES.BLOG_HOME));
    $("btnConta").addEventListener("click", () => location.assign(ROUTES.CONTA));
    $("btnEntrar").addEventListener("click", () => location.assign(ROUTES.CADASTRO));
    $("btnExportPdf").addEventListener("click", () => window.print());
    $("btnLimpar").addEventListener("click", () => {
      $("q").value = ""; $("ref").value = ""; $("sort").value = "title_asc";
      render();
    });
    $("btnRecarregar").addEventListener("click", () => load());

    async function pickFirstExistingTable(candidates){
      for (const t of candidates){
        const { error } = await supabase.from(t).select("*").limit(1);
        if (!error) return t;
      }
      return null;
    }

    const booksTable = await pickFirstExistingTable(["books_public","v_books_public","books"]);
    if (!booksTable) setStatus("Tabela de livros não encontrada.", "bad");

    let rows = [];
    const norm = (s) => String(s||"").toLowerCase();

    function highlight(text, q){
      const t = String(text||"");
      const qq = String(q||"").trim();
      if (!qq) return t;
      const i = t.toLowerCase().indexOf(qq.toLowerCase());
      if (i < 0) return t;
      return t.slice(0,i) + "<mark>" + t.slice(i,i+qq.length) + "</mark>" + t.slice(i+qq.length);
    }

    function sortRows(list){
      const mode = $("sort").value;
      const get = (r, k) => String(r[k] ?? "");
      const by = (k, dir=1) => (a,b) => get(a,k).localeCompare(get(b,k), "pt-BR", { sensitivity:"base" }) * dir;

      if (mode==="title_desc") return list.sort(by("title",-1));
      if (mode==="author_asc") return list.sort(by("author",1));
      if (mode==="author_desc") return list.sort(by("author",-1));
      if (mode==="year_desc") return list.sort((a,b)=> (Number(b.year||0)-Number(a.year||0)));
      if (mode==="year_asc") return list.sort((a,b)=> (Number(a.year||0)-Number(b.year||0)));
      return list.sort(by("title",1));
    }

    async function reserve(bib_ref){
      setStatus("", "");
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        setStatus("Para reservar, você precisa entrar.", "warn");
        return location.assign(ROUTES.CADASTRO);
      }
      const reservasTable = await pickFirstExistingTable(["reservas"]);
      if (!reservasTable) return setStatus("Tabela de reservas não encontrada.", "bad");

      const { error } = await supabase.from(reservasTable).insert({ user_id: session.user.id, bib_ref });
      if (error) return setStatus("Não foi possível reservar: " + error.message, "warn");
      setStatus("Reserva registrada.", "ok");
    }

    function render(){
      const q = $("q").value.trim();
      const ref = $("ref").value.trim();

      let list = rows.slice();
      if (q){
        const qq = norm(q);
        list = list.filter(r =>
          norm(r.title).includes(qq) ||
          norm(r.author).includes(qq) ||
          norm(r.publisher).includes(qq) ||
          norm(r.bib_ref).includes(qq)
        );
      }
      if (ref){
        list = list.filter(r => String(r.bib_ref||"").includes(ref));
      }

      sortRows(list);

      const tbody = $("tbody");
      if (!list.length){
        tbody.innerHTML = `<tr><td colspan="6" class="muted">Nenhum resultado.</td></tr>`;
        return;
      }

      tbody.innerHTML = list.map(r => {
        const bib_ref = r.bib_ref || "—";
        const titleHtml = highlight(r.title || "—", q);
        const author = highlight(r.author || "—", q);
        const year = r.year || "—";
        const publisher = highlight(r.publisher || "—", q);

        const href = `${ROUTES.LIVRO}?ref=${encodeURIComponent(bib_ref)}`;

        return `<tr>
          <td>${bib_ref}</td>
          <td><a class="book-link" href="${href}">${titleHtml}</a></td>
          <td>${author}</td>
          <td>${year}</td>
          <td>${publisher}</td>
          <td>
            <button class="btnMini" data-copy="${bib_ref}" type="button">Copiar ref</button>
            <button class="btnMini" data-reserve="${bib_ref}" type="button">Reservar</button>
          </td>
        </tr>`;
      }).join("");

      tbody.querySelectorAll("button[data-copy]").forEach(b => b.addEventListener("click", async () => {
        const ref = b.getAttribute("data-copy");
        try{
          await navigator.clipboard.writeText(ref);
          setStatus("Referência copiada: " + ref, "ok");
        }catch{
          setStatus("Não consegui copiar (seu navegador bloqueou).", "warn");
        }
      }));

      tbody.querySelectorAll("button[data-reserve]").forEach(b => b.addEventListener("click", async () => {
        const ref = b.getAttribute("data-reserve");
        await reserve(ref);
      }));
    }

    async function load(){
      if (!booksTable) return;
      setStatus("", "");
      $("tbody").innerHTML = `<tr><td colspan="6" class="muted">Carregando…</td></tr>`;

      const { data, error } = await supabase
        .from(booksTable)
        .select("bib_ref,title,autor,author,ano,year,editora,publisher")
        .limit(5000);

      if (error){
        setStatus("Erro ao carregar catálogo: " + error.message, "bad");
        $("tbody").innerHTML = `<tr><td colspan="6" class="muted">Erro ao carregar.</td></tr>`;
        return;
      }

      rows = (data || []).map(r => ({
        bib_ref: r.bib_ref,
        title: r.title,
        author: r.autor ?? r.author,
        year: r.ano ?? r.year,
        publisher: r.editora ?? r.publisher,
      }));

      render();
    }

    $("q").addEventListener("input", render);
    $("ref").addEventListener("input", render);
    $("sort").addEventListener("change", render);

    await load();
  </script>
</body>
</html>
