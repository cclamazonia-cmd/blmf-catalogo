<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BLMF | Catálogo</title>
<style>
:root {
  --bg: #0b0b0b;
  --panel: #121212;
  --panel-2: #181818;
  --line: #2a2a2a;
  --text: #f5f5f5;
  --muted: #c9c9c9;
  --red: #b30018;
  --red-2: #e11d2f;
  --shadow: 0 18px 40px rgba(0,0,0,.45);
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background:
  radial-gradient(circle at top right, rgba(179,0,24,.18), transparent 32%),
  linear-gradient(180deg, #090909 0%, #111 100%);
  color: var(--text);
  font-family: Inter, Segoe UI, Arial, sans-serif;
}
a { color: inherit; }
.wrap { max-width: 1320px; margin: 0 auto; padding: 24px; }
.hero {
  background: linear-gradient(135deg, rgba(179,0,24,.95), rgba(90,0,12,.96));
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 22px;
  padding: 28px;
  box-shadow: var(--shadow);
  margin-bottom: 22px;
}
.hero h1 {
  margin: 0 0 8px;
  font-size: clamp(1.8rem, 3vw, 3rem);
  line-height: 1.05;
}
.hero p {
  margin: 0;
  max-width: 900px;
  color: rgba(255,255,255,.92);
  font-size: 1rem;
}
.note {
  margin-top: 14px;
  font-size: .92rem;
  color: rgba(255,255,255,.9);
}
.toolbar {
  display: grid;
  grid-template-columns: 1.2fr .8fr .8fr .8fr auto auto auto;
  gap: 12px;
  margin-bottom: 18px;
}
@media (max-width: 980px) {
  .toolbar { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 640px) {
  .toolbar { grid-template-columns: 1fr; }
}
.input, .select, .button {
  width: 100%;
  border: 1px solid rgba(255,255,255,.08);
  background: rgba(18,18,18,.96);
  color: var(--text);
  border-radius: 14px;
  padding: 14px 14px;
  font-size: .98rem;
  outline: none;
  box-shadow: var(--shadow);
}
.input:focus, .select:focus {
  border-color: rgba(225,29,47,.8);
  box-shadow: 0 0 0 3px rgba(225,29,47,.2);
}
.button {
  cursor: pointer;
  background: linear-gradient(135deg, var(--red-2), var(--red));
  border: none;
  font-weight: 700;
}

.button.secondary {
  background: rgba(18,18,18,.96);
  border: 1px solid rgba(255,255,255,.14);
  font-weight: 600;
}
.button.secondary:hover {
  border-color: rgba(225,29,47,.55);
}
.action-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,.10);
  background: rgba(18,18,18,.65);
  text-decoration: none;
  font-size: .86rem;
  color: var(--muted);
  box-shadow: var(--shadow);
}
.action-link:hover {
  color: #fff;
  border-color: rgba(225,29,47,.55);
}

.stats {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin: 0 0 16px;
}
.pill {
  border: 1px solid rgba(255,255,255,.08);
  background: rgba(24,24,24,.92);
  color: var(--muted);
  border-radius: 999px;
  padding: 8px 12px;
  font-size: .9rem;
}
.sheet {
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 22px;
  overflow: hidden;
  background: rgba(18,18,18,.96);
  box-shadow: var(--shadow);
}
.sheet-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 14px 18px;
  background: linear-gradient(180deg, #1a1a1a, #121212);
  border-bottom: 1px solid rgba(255,255,255,.06);
}
.sheet-head .title {
  font-weight: 700;
}
.table-wrap {
  overflow: auto;
  max-height: 72vh;
}
table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  min-width: 920px;
}
thead th {
  position: sticky;
  top: 0;
  z-index: 2;
  text-align: left;
  padding: 14px 16px;
  background: linear-gradient(180deg, #26060a, #160407);
  color: #fff;
  border-bottom: 1px solid rgba(255,255,255,.08);
  font-size: .92rem;
  text-transform: uppercase;
  letter-spacing: .04em;
  cursor: pointer;
}
tbody td {
  padding: 12px 16px;
  border-bottom: 1px solid rgba(255,255,255,.05);
  color: #f0f0f0;
  vertical-align: top;
}
tbody tr:nth-child(odd) td { background: rgba(255,255,255,.01); }
tbody tr:hover td { background: rgba(179,0,24,.08); }
.col-ref { width: 10%; white-space: nowrap; font-variant-numeric: tabular-nums; }
.col-ano { width: 10%; white-space: nowrap; }
.muted { color: var(--muted); }

mark{background: rgba(225,29,47,.35); color:#fff; padding:0 2px; border-radius:4px;}
.footer {
  margin-top: 16px;
  color: var(--muted);
  font-size: .9rem;
}
.small {
  font-size: .86rem;
  color: var(--muted);
}

.cell-flex{
  display:flex;
  gap:10px;
  align-items:flex-start;
  justify-content:space-between;
}
.btn-inline{
  width:auto;
  border:1px solid rgba(255,255,255,.12);
  background: rgba(18,18,18,.96);
  color: var(--text);
  border-radius: 12px;
  padding: 8px 10px;
  font-size: .82rem;
  cursor: pointer;
  box-shadow: none;
  white-space: nowrap;
}
.btn-inline:hover{ border-color: rgba(255,255,255,.22); }
.btn-inline:active{ transform: translateY(1px); }

@media (max-width: 640px){
  .cell-flex{ flex-direction:column; align-items:flex-start; }
}
.empty {
  padding: 28px 18px;
  color: var(--muted);
}

/* BLMF logo in title bar */
.topbar-logo,
.header-logo,
.titlebar-logo {
  height: 74px;
  width: auto;
  max-width: 140px;
  object-fit: contain;
  display: block;
  margin-left: 16px;
  flex-shrink: 0;
}
@media (max-width: 700px) {
  .topbar-logo,
  .header-logo,
  .titlebar-logo {
    height: 52px;
    max-width: 100px;
    margin-left: 10px;
  }
}


/* CCLA background image */
body {
  background-image: linear-gradient(rgba(0,0,0,0.78), rgba(0,0,0,0.78)), url('https://cclamazonia.noblogs.org/files/2024/11/Arte-CCLA-paredao.jpg');
  background-size: cover;
  background-position: center center;
  background-attachment: fixed;
  background-repeat: no-repeat;
}


/* OPAC refresh */
.topbar-logo,
.header-logo,
.titlebar-logo {
  height: 111px;
  max-width: 210px;
}
@media (max-width: 700px) {
  .topbar-logo,
  .header-logo,
  .titlebar-logo {
    height: 78px;
    max-width: 150px;
  }
}
.toolbar-opac {
  display: grid;
  grid-template-columns: repeat(12, minmax(0, 1fr));
  gap: 12px;
  margin-bottom: 18px;
}
.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.field label {
  font-size: .88rem;
  color: var(--muted);
  font-weight: 700;
  letter-spacing: .01em;
}
.field-search { grid-column: span 4; }
.field-author { grid-column: span 2; }
.field-publisher { grid-column: span 2; }
.field-year { grid-column: span 2; }
.field-cdd { grid-column: span 2; }
.field-sort { grid-column: span 3; }
.field-availability { grid-column: span 3; }
.actions-strip {
  grid-column: span 6;
  display: flex;
  align-items: end;
  justify-content: flex-end;
  gap: 10px;
  flex-wrap: wrap;
}
.button.small, .action-link.small {
  width: auto;
  padding: 10px 12px;
  font-size: .88rem;
}
.button.tiny, .action-link.tiny {
  width: auto;
  padding: 8px 10px;
  font-size: .82rem;
}
.sheet-head .small { color: var(--muted); }
.muted-inline { color: var(--muted); }
.tag-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 9px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,.12);
  background: rgba(26,26,26,.95);
  color: var(--text);
  text-decoration: none;
  cursor: pointer;
  font-size: .82rem;
  white-space: nowrap;
}
.tag-link:hover { border-color: rgba(225,29,47,.55); color: #fff; }
.status-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 6px 10px;
  border-radius: 999px;
  font-size: .8rem;
  font-weight: 700;
  border: 1px solid rgba(255,255,255,.10);
  white-space: nowrap;
}
.status-available { background: rgba(7,71,35,.55); color: #c9ffd8; border-color: rgba(95,211,140,.35); }
.status-local { background: rgba(104,28,28,.48); color: #ffd0d0; border-color: rgba(225,29,47,.38); }
.status-unavailable { background: rgba(55,55,55,.85); color: #f0f0f0; border-color: rgba(255,255,255,.12); }
.ref-stack {
  display:flex;
  flex-direction:column;
  gap:8px;
}
.ref-main { font-weight:700; }
.cell-flex.wrap { flex-wrap: wrap; gap: 8px; align-items: center; }
th.sortable { cursor: pointer; }
@media (max-width: 1180px) {
  .field-search { grid-column: span 12; }
  .field-author, .field-publisher, .field-year, .field-cdd { grid-column: span 6; }
  .field-sort, .field-availability { grid-column: span 6; }
  .actions-strip { grid-column: span 12; justify-content: flex-start; }
}
@media (max-width: 720px) {
  .field-author, .field-publisher, .field-year, .field-cdd,
  .field-sort, .field-availability, .field-search { grid-column: span 12; }
  .table-wrap { max-height: none; }
  table { min-width: 920px; }
}

</style>
</head>

            <th>ref</th>
            <th>autor</th>

</div>

<script>
const SUPABASE_URL = "https://asptfmokzykwzlshsncw.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_38cFV9vsGhmqMp-Z5gmV4w_HY6ReWSF";

const BLOG_HOME = "https://cclamazonia.noblogs.org";
const CONTA_URL = "https://cclamazonia-cmd.github.io/blmf-conta/conta.html";
const PAINEL_URL = "https://cclamazonia-cmd.github.io/blmf-conta/painel.html";
const CADASTRO_URL = "https://cclamazonia-cmd.github.io/blmf-conta/cadastro.html";
const LIVRO_URL = "livro.html";
const SUPABASE_PROJECT_REF = "asptfmokzykwzlshsncw";

function getSupabaseSessionFromStorage() {
  const keys = [];
  try {
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (!k) continue;
      if (k.startsWith('sb-') && k.includes(SUPABASE_PROJECT_REF) && k.endsWith('-auth-token')) keys.push(k);
    }
  } catch (e) {}
  keys.push(`sb-${SUPABASE_PROJECT_REF}-auth-token`);
  for (const k of keys) {
    let raw = null;
    try { raw = localStorage.getItem(k); } catch (e) { raw = null; }
    if (!raw) continue;
    try {
      const obj = JSON.parse(raw);
      if (obj?.access_token) return obj;
      if (obj?.currentSession?.access_token) return obj.currentSession;
      if (obj?.data?.session?.access_token) return obj.data.session;
    } catch (e) {}
  }
  return null;
}

async function getCurrentUserAndRole() {
  const s = getSupabaseSessionFromStorage();
  if (!s || !s.access_token) return { session: null, user: null, isLibrarian: false };
  if (s.expires_at && (Date.now() / 1000) > (Number(s.expires_at) - 30)) return { session: null, user: null, isLibrarian: false };

  try {
    const userRes = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
      headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${s.access_token}` }
    });
    if (!userRes.ok) return { session: null, user: null, isLibrarian: false };
    const user = await userRes.json();

    let isLibrarian = false;
    try {
      const profileRes = await fetch(`${SUPABASE_URL}/rest/v1/profiles?select=is_librarian&id=eq.${encodeURIComponent(user.id)}`, {
        headers: {
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${s.access_token}`,
          Accept: 'application/json'
        }
      });
      if (profileRes.ok) {
        const arr = await profileRes.json();
        isLibrarian = !!(Array.isArray(arr) && arr[0] && arr[0].is_librarian);
      }
    } catch (e) {}

    return { session: s, user, isLibrarian };
  } catch (e) {
    return { session: s, user: null, isLibrarian: false };
  }
}

let rows = [];
let lastQuery = { tokens: [], phrases: [] };

const tbody = document.getElementById('tbody');
const search = document.getElementById('search');
const authorFilter = document.getElementById('authorFilter');
const publisherFilter = document.getElementById('publisherFilter');
const yearFilter = document.getElementById('yearFilter');
const cddFilter = document.getElementById('cddFilter');
const sortSelect = document.getElementById('sortSelect');
const availabilityFilter = document.getElementById('availabilityFilter');
const totalPill = document.getElementById('totalPill');
const visiblePill = document.getElementById('visiblePill');
const statusPill = document.getElementById('statusPill');
const empty = document.getElementById('empty');
const contaBtn = document.getElementById('contaBtn');
const clearBtn = document.getElementById('clearBtn');
const pdfBtn = document.getElementById('pdfBtn');
const csvAdvancedLink = document.getElementById('csvAdvancedLink');

function normalize(s) {
  return (s || '').toString().normalize('NFD').replace(/[̀-ͯ]/g, '').toLowerCase().trim();
}
function escapeHTML(s) {
  return (s ?? '').toString().replace(/[&<>"']/g, (m) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;' }[m]));
}
function escapeRegExp(s) {
  return (s || '').replace(/[-\/\^$*+?.()|[\]{}]/g, '\$&');
}
function bigrams(str) {
  const s = str || '';
  const map = new Map();
  for (let i = 0; i < s.length - 1; i++) {
    const bg = s.slice(i, i + 2);
    map.set(bg, (map.get(bg) || 0) + 1);
  }
  return map;
}
function diceCoefficient(a, b) {
  if (!a || !b) return 0;
  if (a === b) return 1;
  if (a.length < 2 || b.length < 2) return 0;
  const A = bigrams(a);
  const B = bigrams(b);
  let overlap = 0;
  for (const [bg, countA] of A) {
    const countB = B.get(bg) || 0;
    overlap += Math.min(countA, countB);
  }
  return (2 * overlap) / ((a.length - 1) + (b.length - 1));
}

function getStatusInfo(r) {
  if (r.loanable === false) return { key: 'local', label: 'Somente consulta local', cls: 'status-local' };
  if (Number(r.available_count || 0) > 0) return { key: 'available', label: 'Disponível agora', cls: 'status-available' };
  return { key: 'unavailable', label: 'Indisponível no momento', cls: 'status-unavailable' };
}

function parseQuery(raw) {
  const out = { tokens: [], phrases: [] };
  const s = (raw || '').toString().trim();
  if (!s) return out;
  const re = /"([^"]+)"|(\S+)/g;
  let m;
  while ((m = re.exec(s))) {
    const phrase = m[1];
    const word = m[2];
    if (phrase) {
      const p = normalize(phrase);
      if (p) out.phrases.push(p);
    } else if (word) {
      const t = normalize(word);
      if (t) out.tokens.push(t);
    }
  }
  out.tokens = [...new Set(out.tokens)];
  out.phrases = [...new Set(out.phrases)];
  return out;
}

function scoreRow(r, q) {
  for (const ph of q.phrases) {
    if (!r._all.includes(ph)) return { ok: false, score: 0 };
  }
  let score = 0;
  for (const t of q.tokens) {
    if (!t) continue;
    if (r._all.includes(t)) {
      score += 10;
      continue;
    }
    let best = 0;
    const first = t[0];
    for (const w of r._words) {
      if (!w || w[0] !== first) continue;
      if (Math.abs(w.length - t.length) > 3) continue;
      const d = diceCoefficient(t, w);
      if (d > best) best = d;
      if (best >= 0.92) break;
    }
    if (best >= 0.78) {
      score += 4 + best * 6;
      continue;
    }
    return { ok: false, score: 0 };
  }
  if (q.tokens[0]) {
    if (r._n.titulo.startsWith(q.tokens[0])) score += 2;
    if (r._n.autor.startsWith(q.tokens[0])) score += 2;
  }
  return { ok: true, score };
}

function highlightHTML(text, terms) {
  const safe = escapeHTML(text || '');
  if (!terms || !terms.length) return safe;
  const uniq = [...new Set(terms.filter(t => (t || '').length >= 2))].sort((a,b) => b.length - a.length);
  let out = safe;
  for (const t of uniq) {
    const re = new RegExp(escapeRegExp(t), 'ig');
    out = out.replace(re, (m) => `<mark>${m}</mark>`);
  }
  return out;
}

function matchYearField(fieldValue, raw) {
  const s = (raw || '').toString().trim();
  if (!s) return true;
  const y = (fieldValue ?? '').toString().trim();
  if (!y) return false;
  const m = s.match(/^\s*(\d{1,4})\s*-\s*(\d{1,4})\s*$/);
  if (m) {
    const a = parseInt(m[1], 10);
    const b = parseInt(m[2], 10);
    const yy = parseInt(y, 10);
    if (Number.isNaN(a) || Number.isNaN(b) || Number.isNaN(yy)) return false;
    return yy >= Math.min(a,b) && yy <= Math.max(a,b);
  }
  const digitsOnly = s.replace(/[^0-9]/g, '');
  if (!digitsOnly) return true;
  if (digitsOnly.length >= 4) return y === digitsOnly.slice(0,4);
  return y.startsWith(digitsOnly);
}

function prepareRows() {
  for (const r of rows) {
    const status = getStatusInfo(r);
    r._status = status;
    const data = {
      bib_ref: normalize(r.bib_ref),
      autor: normalize(r.autor),
      titulo: normalize(r.titulo),
      ano: normalize(r.ano),
      editora: normalize(r.editora),
      cdd: normalize(r.cdd),
      status: normalize(status.label)
    };
    r._n = data;
    r._all = [data.bib_ref, data.autor, data.titulo, data.ano, data.editora, data.cdd, data.status].filter(Boolean).join(' ');
    r._words = r._all ? r._all.split(/\s+/).filter(Boolean) : [];
  }
}

async function loadRowsFromSupabase() {
  try {
    const select = 'id,bib_ref,autor,titulo,ano,editora,cdd,loanable,available_count,created_at';
    const url = `${SUPABASE_URL}/rest/v1/v_books_public?select=${encodeURIComponent(select)}&order=titulo.asc`;
    const res = await fetch(url, {
      headers: {
        apikey: SUPABASE_ANON_KEY,
        Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
        Accept: 'application/json'
      }
    });
    const text = await res.text();
    if (!res.ok) {
      alert('Erro ao carregar catálogo: ' + res.status + ' — ' + text);
      return [];
    }
    const data = text ? JSON.parse(text) : [];
    return (data || []).map(r => ({
      id: r.id ?? null,
      bib_ref: r.bib_ref ?? '',
      autor: r.autor ?? '',
      titulo: r.titulo ?? '',
      ano: r.ano ?? '',
      editora: r.editora ?? '',
      cdd: r.cdd ?? '',
      loanable: r.loanable === false ? false : true,
      available_count: Number(r.available_count ?? 0) || 0,
      created_at: r.created_at ?? null
    }));
  } catch (e) {
    alert('Erro ao carregar catálogo: ' + (e?.message || String(e)));
    return [];
  }
}

function currentRows() {
  const q = parseQuery(search.value || '');
  lastQuery = q;
  const author = normalize(authorFilter.value);
  const publisher = normalize(publisherFilter.value);
  const year = (yearFilter.value || '').toString().trim();
  const cdd = normalize(cddFilter.value);
  const availability = availabilityFilter.value;
  const hasQuery = q.tokens.length > 0 || q.phrases.length > 0;

  const filtered = [];
  for (const r of rows) {
    if (author && !r._n.autor.includes(author)) continue;
    if (publisher && !r._n.editora.includes(publisher)) continue;
    if (!matchYearField(r.ano, year)) continue;
    if (cdd && !r._n.cdd.includes(cdd)) continue;
    if (availability !== 'all' && r._status.key !== availability) continue;

    if (!hasQuery) {
      r._score = 0;
      filtered.push(r);
      continue;
    }
    const res = scoreRow(r, q);
    if (!res.ok) continue;
    r._score = res.score;
    filtered.push(r);
  }

  const mode = sortSelect.value;
  filtered.sort((a, b) => {
    if (mode === 'relevance') {
      if (hasQuery) {
        const diff = (b._score || 0) - (a._score || 0);
        if (diff) return diff;
      }
      return a._n.titulo.localeCompare(b._n.titulo, 'pt-BR', { numeric: true });
    }
    if (mode === 'titulo') return a._n.titulo.localeCompare(b._n.titulo, 'pt-BR', { numeric: true });
    if (mode === 'autor') return a._n.autor.localeCompare(b._n.autor, 'pt-BR', { numeric: true });
    if (mode === 'editora') return a._n.editora.localeCompare(b._n.editora, 'pt-BR', { numeric: true });
    if (mode === 'cdd') return a._n.cdd.localeCompare(b._n.cdd, 'pt-BR', { numeric: true });
    if (mode === 'ano_asc') return a._n.ano.localeCompare(b._n.ano, 'pt-BR', { numeric: true });
    if (mode === 'ano_desc') return b._n.ano.localeCompare(a._n.ano, 'pt-BR', { numeric: true });
    return a._n.titulo.localeCompare(b._n.titulo, 'pt-BR', { numeric: true });
  });

  return filtered;
}

function updateStats(filtered) {
  totalPill.textContent = `Total: ${rows.length}`;
  visiblePill.textContent = `Exibidos: ${filtered.length}`;
  const availableNow = filtered.filter(r => r._status.key === 'available').length;
  statusPill.textContent = `Disponíveis agora: ${availableNow}`;
}

function render() {
  const filtered = currentRows();
  tbody.innerHTML = '';
  updateStats(filtered);
  empty.hidden = filtered.length !== 0;

  for (const r of filtered) {
    const tr = document.createElement('tr');
    const ref = r.bib_ref || '';
    const terms = [...(lastQuery.phrases || []), ...(lastQuery.tokens || [])];
    const refHtml = ref ? highlightHTML(ref, terms) : '<span class="muted">—</span>';
    const autorText = r.autor || '—';
    const autorHtml = r.autor
      ? `<button class="tag-link author-chip" type="button" data-author="${escapeHTML(r.autor)}">${highlightHTML(r.autor, terms)}</button>`
      : '<span class="muted">—</span>';
    const livroUrl = ref ? `${LIVRO_URL}?ref=${encodeURIComponent(ref)}` : '#';
    const tituloHtml = r.titulo ? highlightHTML(r.titulo, terms) : '<span class="muted">—</span>';
    const tituloCell = ref ? `<a href="${livroUrl}" style="text-decoration:none; font-weight:700;">${tituloHtml}</a>` : tituloHtml;
    const anoHtml = r.ano ? highlightHTML(r.ano, terms) : '<span class="muted">—</span>';
    const editoraHtml = r.editora ? highlightHTML(r.editora, terms) : '<span class="muted">—</span>';
    const cddHtml = r.cdd
      ? `<button class="tag-link cdd-chip" type="button" data-cdd="${escapeHTML(r.cdd)}">${highlightHTML(r.cdd, terms)}</button>`
      : '<span class="muted">—</span>';
    const status = r._status;
    tr.innerHTML = `
      <td class="col-ref"><div class="ref-stack"><span class="ref-main">${refHtml}</span></div></td>
      <td>${autorHtml}</td>
      <td>${tituloCell}</td>
      <td class="col-ano">${anoHtml}</td>
      <td>${editoraHtml}</td>
      <td>${cddHtml}</td>
      <td><span class="status-badge ${status.cls}">${status.label}</span></td>
      <td><button class="btn-inline copyRefBtn" type="button" data-ref="${encodeURIComponent(ref)}">Copiar referência</button></td>
    `;
    tbody.appendChild(tr);
  }
}

function debounce(fn, ms) {
  let t;
  return (...args) => {
    clearTimeout(t);
    t = setTimeout(() => fn(...args), ms);
  };
}
const debouncedRender = debounce(render, 120);

function toCSV(rowsToExport) {
  const cols = ['bib_ref','autor','titulo','ano','editora','cdd','status'];
  const labels = { bib_ref:'ref', autor:'autor', titulo:'título', ano:'ano', editora:'editora', cdd:'CDD', status:'status' };
  const esc = (v) => {
    const s = (v ?? '').toString().replace(/\r?\n/g, ' ').trim();
    const needs = /[",;]/.test(s);
    const out = s.replace(/"/g, '""');
    return needs ? `"${out}"` : out;
  };
  const header = cols.map(c => labels[c]).join(';');
  const lines = rowsToExport.map(r => cols.map(c => esc(c === 'status' ? r._status.label : r[c])).join(';'));
  return '\ufeff' + [header, ...lines].join('\n');
}
function exportCSV() {
  const filtered = currentRows();
  const csv = toCSV(filtered);
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const d = new Date();
  const stamp = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  a.href = url;
  a.download = `BLMF-catalogo-${stamp}.csv`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}
function exportPDF() {
  const filtered = currentRows();
  const d = new Date();
  const stamp = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const rowsHtml = filtered.map(r => `
    <tr>
      <td>${escapeHTML(r.bib_ref || '—')}</td>
      <td>${escapeHTML(r.autor || '—')}</td>
      <td>${escapeHTML(r.titulo || '—')}</td>
      <td>${escapeHTML(r.ano || '—')}</td>
      <td>${escapeHTML(r.editora || '—')}</td>
      <td>${escapeHTML(r.cdd || '—')}</td>
      <td>${escapeHTML(r._status.label)}</td>
    </tr>`).join('');
  const w = window.open('', '_blank');
  if (!w) {
    alert('O navegador bloqueou a janela de exportação. Autorize pop-ups para exportar em PDF.');
    return;
  }
  w.document.write(`<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Catálogo da BLMF — PDF</title><style>body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;padding:28px;color:#111}h1{font-size:18px;margin:0 0 6px}.meta{font-size:12px;color:#444;margin-bottom:14px}table{width:100%;border-collapse:collapse}th,td{border:1px solid #ddd;padding:6px 8px;font-size:12px;vertical-align:top}th{background:#f4f4f4;text-transform:uppercase;letter-spacing:.04em;font-size:11px}@page{size:A4;margin:12mm}</style></head><body><h1>Catálogo da BLMF</h1><div class="meta">Exportado em ${stamp} · ${filtered.length} item(ns)</div><div style="margin:12px 0 16px;"><button onclick="window.print()" style="padding:8px 10px;border:1px solid #aaa;border-radius:8px;background:#fff;cursor:pointer;">Imprimir / Salvar em PDF</button><span style="font-size:12px;color:#444;margin-left:10px;">(Escolha “Salvar como PDF” na janela de impressão)</span></div><table><thead><tr><th>ref</th><th>autor</th><th>título</th><th>ano</th><th>editora</th><th>CDD</th><th>status</th></tr></thead><tbody>${rowsHtml}</tbody></table></body></html>`);
  w.document.close();
}

function clearFilters() {
  search.value = '';
  authorFilter.value = '';
  publisherFilter.value = '';
  yearFilter.value = '';
  cddFilter.value = '';
  availabilityFilter.value = 'all';
  sortSelect.value = 'relevance';
  render();
  search.focus();
}

async function handleContaClick() {
  const state = await getCurrentUserAndRole();
  if (!state.user) {
    location.assign(CADASTRO_URL);
    return;
  }
  location.assign(state.isLibrarian ? PAINEL_URL : CONTA_URL);
}

search.addEventListener('input', debouncedRender);
authorFilter.addEventListener('input', render);
publisherFilter.addEventListener('input', render);
yearFilter.addEventListener('input', render);
cddFilter.addEventListener('input', render);
availabilityFilter.addEventListener('change', render);
sortSelect.addEventListener('change', render);
clearBtn.addEventListener('click', clearFilters);
pdfBtn.addEventListener('click', exportPDF);
csvAdvancedLink.addEventListener('click', (e) => { e.preventDefault(); exportCSV(); });
contaBtn.addEventListener('click', handleContaClick);

tbody.addEventListener('click', async (e) => {
  const copyBtn = e.target.closest('.copyRefBtn');
  if (copyBtn) {
    const txt = decodeURIComponent(copyBtn.dataset.ref || '');
    try {
      await navigator.clipboard.writeText(txt);
    } catch (err) {
      const ta = document.createElement('textarea');
      ta.value = txt;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); } catch (e2) {}
      ta.remove();
    }
    const prev = copyBtn.textContent;
    copyBtn.textContent = 'Copiado!';
    copyBtn.disabled = true;
    setTimeout(() => { copyBtn.textContent = prev; copyBtn.disabled = false; }, 900);
    return;
  }

  const authorBtn = e.target.closest('.author-chip');
  if (authorBtn) {
    authorFilter.value = authorBtn.dataset.author || '';
    render();
    return;
  }

  const cddBtn = e.target.closest('.cdd-chip');
  if (cddBtn) {
    cddFilter.value = cddBtn.dataset.cdd || '';
    render();
  }
});

document.addEventListener('keydown', (e) => {
  if (e.key === '/' && document.activeElement !== search && !e.ctrlKey && !e.metaKey && !e.altKey) {
    e.preventDefault();
    search.focus();
  }
  if (e.key === 'Escape' && document.activeElement === search) {
    search.value = '';
    debouncedRender();
  }
});

(async function init() {
  rows = await loadRowsFromSupabase();
  prepareRows();
  render();
})();
</script>
