<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BLMF — Livro</title>

  <style>
    :root{
      --panel:rgba(18,18,18,.96);
      --text:#f2f2f2; --muted:rgba(255,255,255,.72);
      --red:#b30018; --red2:#e11d2f;
      --line:rgba(255,255,255,.10);
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --ok:#4ade80; --warn:#fbbf24; --bad:#fb7185;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;color:var(--text);font-family:Inter, Segoe UI, Arial, sans-serif;}
    body{
      background-image:
        linear-gradient(rgba(0,0,0,0.78), rgba(0,0,0,0.78)),
        url('https://cclamazonia.noblogs.org/files/2024/11/Arte-CCLA-paredao.jpg');
      background-size:cover; background-position:center; background-attachment:fixed; background-repeat:no-repeat;
    }
    a, a:visited{color:inherit}
    .wrap{max-width:1080px;margin:0 auto;padding:24px}

    .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px}
    .brand{display:flex;align-items:center;gap:12px}
    .logo{
      height:64px;width:auto;max-width:160px;object-fit:contain;display:block;flex-shrink:0;
      filter:drop-shadow(0 8px 18px rgba(0,0,0,.35))
    }
    .btn{
      border:1px solid var(--line); background:rgba(18,18,18,.92);
      color:var(--text); border-radius:14px; padding:10px 12px;
      cursor:pointer; box-shadow: var(--shadow);
      font-weight:900; font-size:.95rem;
    }
    .btn.primary{border:none;background:linear-gradient(135deg,var(--red2),var(--red))}
    .btn:hover{border-color:rgba(255,255,255,.22)}
    .btn[aria-disabled="true"]{
      opacity:.55;
      cursor:default;
    }

    .card{border:1px solid rgba(255,255,255,.08); background:var(--panel); border-radius:22px; padding:16px; box-shadow:var(--shadow)}
    .title{margin:0 0 6px;font-size:1.45rem}
    .muted{color:var(--muted)}
    .meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
    @media (max-width:720px){.meta{grid-template-columns:1fr}}
    .pill{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(255,255,255,.10);background:rgba(18,18,18,.65);padding:7px 10px;border-radius:999px;font-size:.9rem;color:var(--muted)}
    .status{margin-top:10px;font-size:.92rem}
    .status.ok{color:var(--ok)} .status.warn{color:var(--warn)} .status.bad{color:var(--bad)}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .hr{height:1px;background:rgba(255,255,255,.08);margin:14px 0}
  </style>
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <img class="logo"
             src="https://cclamazonia.noblogs.org/files/2026/03/logo_detoure_BLMF.png"
             alt="BLMF" />
      </div>

      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <a class="btn" id="btnBlog" href="https://cclamazonia.noblogs.org/" rel="noopener">Voltar ao blogue</a>
        <a class="btn" id="btnCatalogo" href="#" rel="noopener">Voltar ao catálogo</a>
        <button class="btn" id="btnConta" type="button" aria-disabled="true" title="Disponível apenas quando logado(a/e).">Minha conta</button>
        <a class="btn primary" id="btnEntrar" href="#" rel="noopener">Entrar</a>
      </div>
    </div>

    <div class="card">
      <h1 class="title" id="title">Carregando…</h1>
      <div class="muted" id="authorLine">—</div>

      <div class="meta" style="margin-top:12px">
        <div class="pill" id="bibRefPill">ref: —</div>
        <div class="pill" id="yearPill">ano: —</div>
        <div class="pill" id="pubPill">editora: —</div>
        <div class="pill" id="cddPill">CDD: —</div>
      </div>

      <div class="hr"></div>

      <div class="muted" id="desc">—</div>

      <div class="actions">
        <button class="btn primary" id="btnReservar" type="button">Reservar este livro</button>
        <button class="btn" id="btnAbrirPdf" type="button" style="display:none">Abrir PDF</button>
      </div>

      <div class="status" id="status"></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    // Base GitHub (au cas où tu es sur cclamazonia-cmd.github.io)
    const GH_BASE = location.origin.includes("cclamazonia-cmd.github.io")
      ? "https://cclamazonia-cmd.github.io"
      : "https://cclamazonia.github.io";

    const ROUTES = {
      BLOG_HOME: "https://cclamazonia.noblogs.org/",
      CATALOGO: `${GH_BASE}/blmf-catalogo/index.html`,
      LIVRO: `${GH_BASE}/blmf-catalogo/livro.html`,
      CADASTRO: `${GH_BASE}/blmf-conta/cadastro.html`,
      CONTA: `${GH_BASE}/blmf-conta/conta.html`,
    };

    // Fix liens
    document.getElementById("btnCatalogo").href = ROUTES.CATALOGO;
    document.getElementById("btnEntrar").href = ROUTES.CADASTRO;

    const SUPABASE_URL = "https://asptfmokzykwzlshsncw.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFzcHRmbW9renlrd3psc2hzbmN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MzcxNzcsImV4cCI6MjA4ODExMzE3N30.JkMLHPCV2AH5ELZV_1RfcoW250QEofLGvnDKSDpkcn0";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
    });

    const $ = (id) => document.getElementById(id);
    const setStatus = (msg, cls) => {
      const el = $("status");
      el.className = "status" + (cls ? " " + cls : "");
      el.textContent = msg || "";
    };

    // Normalisation sans accents
    const nk = (s) => String(s||"").normalize("NFD").replace(/\p{Diacritic}/gu,"").toLowerCase();

    function findCol(keys, wanted){
      const map = new Map(keys.map(k => [nk(k), k]));
      for (const w of wanted){
        const hit = map.get(nk(w));
        if (hit) return hit;
      }
      return null;
    }

    async function pickFirstExistingTable(candidates){
      for (const t of candidates){
        const { error } = await supabase.from(t).select("*").limit(1);
        if (!error) return t;
      }
      return null;
    }

    function getBibRefFromUrl(){
      const u = new URL(location.href);
      return (u.searchParams.get("ref") || u.searchParams.get("bib_ref") || "").trim();
    }

    // Minha conta: action UNIQUEMENT si logado, sinon clic dans le vide
    async function setupContaButton(){
      const btn = $("btnConta");
      const { data: { session } } = await supabase.auth.getSession();
      if (session?.user?.id){
        btn.setAttribute("aria-disabled", "false");
        btn.title = "Abrir minha conta";
        btn.addEventListener("click", () => location.assign(ROUTES.CONTA));
      } else {
        btn.setAttribute("aria-disabled", "true");
        btn.title = "Você não está logado(a/e).";
        btn.addEventListener("click", (e) => { e.preventDefault(); /* nada */ });
      }
    }

    // Réserver
    async function reserve(bib_ref){
      setStatus("", "");
      const { data: { session } } = await supabase.auth.getSession();
      if (!session){
        setStatus("Para reservar, você precisa entrar.", "warn");
        // Entrar = conta repo (cadastro)
        location.assign(ROUTES.CADASTRO);
        return;
      }

      const reservasTable = await pickFirstExistingTable(["reservas"]);
      if (!reservasTable) return setStatus("Tabela de reservas não encontrada.", "bad");

      const { error } = await supabase.from(reservasTable).insert({ user_id: session.user.id, bib_ref });
      if (error){
        return setStatus("Não foi possível reservar: " + error.message, "warn");
      }
      setStatus("Reserva registrada.", "ok");
    }

    async function loadBook(){
      const bib_ref = getBibRefFromUrl();
      if (!bib_ref){
        $("title").textContent = "Livro não encontrado";
        setStatus("Faltou a referência na URL (ex.: livro.html?ref=0000124).", "warn");
        return;
      }

      const booksTable = await pickFirstExistingTable(["books_public","v_books_public","books"]);
      if (!booksTable){
        setStatus("Tabela de livros não encontrada.", "bad");
        return;
      }

      // Inspect 1 ligne pour détecter colonnes
      const peek = await supabase.from(booksTable).select("*").limit(1);
      if (peek.error){
        setStatus("Erro ao inspecionar catálogo: " + peek.error.message, "bad");
        return;
      }
      const sample = (peek.data && peek.data[0]) ? peek.data[0] : {};
      const keys = Object.keys(sample);

      // Détecter colonnes “BibLivre-like”
      const colRef = findCol(keys, ["bib_ref","bibref","ref","referencia","referência"]) || "bib_ref";
      const colTit = findCol(keys, ["title","titulo","título","nome"]);
      const colAut = findCol(keys, ["autor","author","autores"]);
      const colAno = findCol(keys, ["ano","year"]);
      const colEdi = findCol(keys, ["editora","publisher"]);
      const colCDD = findCol(keys, ["cdd","CDD","classificacao","classificação"]);
      const colRes = findCol(keys, ["resumo","descricao","descrição","description","obs","observacao","observação"]);
      const colPdf = findCol(keys, ["pdf_url","url_pdf","pdf","arquivo_pdf","link_pdf","url"]);

      // Charger le livre (select * pour éviter erreurs de colonnes)
      const { data, error } = await supabase
        .from(booksTable)
        .select("*")
        .eq(colRef, bib_ref)
        .maybeSingle();

      if (error){
        setStatus("Erro ao carregar livro: " + error.message, "bad");
        return;
      }
      if (!data){
        $("title").textContent = "Livro não encontrado";
        setStatus("Não encontrei esse livro no catálogo.", "warn");
        return;
      }

      const titulo = colTit ? (data[colTit] || "") : "";
      const autor  = colAut ? (data[colAut] || "") : "";
      const ano    = colAno ? (data[colAno] || "") : "";
      const editora= colEdi ? (data[colEdi] || "") : "";
      const cdd    = colCDD ? (data[colCDD] || "") : "";
      const resumo = colRes ? (data[colRes] || "") : "";
      const pdf    = colPdf ? (data[colPdf] || "") : "";

      $("title").textContent = titulo || "Sem título";
      $("authorLine").textContent = autor || "—";
      $("bibRefPill").textContent = "ref: " + (data[colRef] || "—");
      $("yearPill").textContent = "ano: " + (ano || "—");
      $("pubPill").textContent = "editora: " + (editora || "—");
      $("cddPill").textContent = "CDD: " + (cdd || "—");
      $("desc").textContent = resumo || "—";

      if (pdf){
        $("btnAbrirPdf").style.display = "inline-block";
        $("btnAbrirPdf").addEventListener("click", () => location.assign(pdf));
      }

      $("btnReservar").addEventListener("click", () => reserve(bib_ref));
    }

    await setupContaButton();
    await loadBook();
  </script>
</body>
</html>
