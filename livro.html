<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BLMF — Livro</title>
  <style>
    :root{
      --panel:rgba(18,18,18,.96);
      --text:#f2f2f2; --muted:rgba(255,255,255,.72);
      --red:#b30018; --red2:#e11d2f;
      --line:rgba(255,255,255,.10);
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --ok:#4ade80; --warn:#fbbf24; --bad:#fb7185;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;color:var(--text);font-family:Inter, Segoe UI, Arial, sans-serif;}
    body{
      background-image:
        linear-gradient(rgba(0,0,0,0.78), rgba(0,0,0,0.78)),
        url('https://cclamazonia.noblogs.org/files/2024/11/Arte-CCLA-paredao.jpg');
      background-size:cover; background-position:center; background-attachment:fixed; background-repeat:no-repeat;
    }
    a, a:visited{color:inherit}
    .wrap{max-width:1080px;margin:0 auto;padding:24px}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px}
    .brand{display:flex;align-items:center;gap:12px}
    .logo{height:64px;width:auto;max-width:140px;object-fit:contain;display:block;flex-shrink:0;filter:drop-shadow(0 8px 18px rgba(0,0,0,.35))}
    .btn{
      border:1px solid var(--line); background:rgba(18,18,18,.92);
      color:var(--text); border-radius:14px; padding:10px 12px;
      cursor:pointer; box-shadow: var(--shadow);
      font-weight:900; font-size:.95rem;
    }
    .btn.primary{border:none;background:linear-gradient(135deg,var(--red2),var(--red))}
    .btn:hover{border-color:rgba(255,255,255,.22)}
    .card{border:1px solid rgba(255,255,255,.08); background:var(--panel); border-radius:22px; padding:16px; box-shadow:var(--shadow)}
    .title{margin:0 0 6px;font-size:1.45rem}
    .muted{color:var(--muted)}
    .meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
    @media (max-width:720px){.meta{grid-template-columns:1fr}}
    .pill{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(255,255,255,.10);background:rgba(18,18,18,.65);padding:7px 10px;border-radius:999px;font-size:.9rem;color:var(--muted)}
    .status{margin-top:10px;font-size:.92rem}
    .status.ok{color:var(--ok)} .status.warn{color:var(--warn)} .status.bad{color:var(--bad)}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .hr{height:1px;background:rgba(255,255,255,.08);margin:14px 0}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <img class="logo" src="logo-blmf.png" alt="BLMF" onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='block';" />
        <div id="logoFallback" style="display:none">
          <div style="font-weight:900;letter-spacing:.04em">BLMF</div>
          <div class="muted" style="font-size:.86rem">Biblioteca Libertária Maxwell Ferreira</div>
        </div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn" id="btnBlog" type="button">Voltar ao blogue</button>
        <button class="btn" id="btnCatalogo" type="button">Voltar ao catálogo</button>
        <button class="btn" id="btnConta" type="button">Minha conta</button>
        <button class="btn primary" id="btnEntrar" type="button">Entrar</button>
      </div>
    </div>

    <div class="card">
      <h1 class="title" id="title">Carregando…</h1>
      <div class="muted" id="authorLine">—</div>

      <div class="meta" style="margin-top:12px">
        <div class="pill" id="bibRefPill">ref: —</div>
        <div class="pill" id="yearPill">ano: —</div>
        <div class="pill" id="pubPill">editora: —</div>
        <div class="pill" id="cddPill">CDD: —</div>
      </div>

      <div class="hr"></div>

      <div class="muted" id="desc">—</div>

      <div class="actions">
        <button class="btn primary" id="btnReservar" type="button">Reservar este livro</button>
        <button class="btn" id="btnAbrirPdf" type="button" style="display:none">Abrir PDF</button>
      </div>
      <div class="status" id="status"></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const ROUTES = {
      BLOG_HOME: "https://cclamazonia.noblogs.org/",
      CATALOGO: "https://cclamazonia.github.io/blmf-catalogo/index.html",
      CADASTRO: "https://cclamazonia.github.io/blmf-conta/cadastro.html",
      CONTA: "https://cclamazonia.github.io/blmf-conta/conta.html",
    };

    const SUPABASE_URL = "https://asptfmokzykwzlshsncw.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFzcHRmbW9renlrd3psc2hzbmN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MzcxNzcsImV4cCI6MjA4ODExMzE3N30.JkMLHPCV2AH5ELZV_1RfcoW250QEofLGvnDKSDpkcn0";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
    });

    const $ = (id) => document.getElementById(id);
    const setStatus = (msg, cls) => {
      const el = $("status");
      el.className = "status" + (cls ? " " + cls : "");
      el.textContent = msg || "";
    };

    $("btnBlog").addEventListener("click", () => location.assign(ROUTES.BLOG_HOME));
    $("btnCatalogo").addEventListener("click", () => location.assign(ROUTES.CATALOGO));
    $("btnConta").addEventListener("click", () => location.assign(ROUTES.CONTA));
    $("btnEntrar").addEventListener("click", () => location.assign(ROUTES.CADASTRO));

    async function pickFirstExistingTable(candidates){
      for (const t of candidates){
        const { error } = await supabase.from(t).select("*").limit(1);
        if (!error) return t;
      }
      return null;
    }

    function getBibRefFromUrl(){
      const u = new URL(location.href);
      return (u.searchParams.get("ref") || u.searchParams.get("bib_ref") || "").trim();
    }

    const bib_ref = getBibRefFromUrl();
    if (!bib_ref) {
      $("title").textContent = "Livro não encontrado";
      setStatus("Faltou a referência na URL (ex.: livro.html?ref=0000124).", "warn");
    }

    const booksTable = await pickFirstExistingTable(["books_public","v_books_public","books"]);
    if (!booksTable) setStatus("Tabela de livros não encontrada.", "bad");

    async function loadBook(){
      if (!booksTable || !bib_ref) return;
      setStatus("", "");
      const { data, error } = await supabase.from(booksTable).select("*").eq("bib_ref", bib_ref).maybeSingle();
      if (error) return setStatus("Erro ao carregar: " + error.message, "bad");
      if (!data) return setStatus("Não encontrei esse livro no catálogo.", "warn");

      $("title").textContent = data.title || "Sem título";
      $("authorLine").textContent = data.autor || data.author || data.autores || "—";
      $("bibRefPill").textContent = "ref: " + (data.bib_ref || "—");
      $("yearPill").textContent = "ano: " + (data.ano || data.year || "—");
      $("pubPill").textContent = "editora: " + (data.editora || data.publisher || "—");
      $("cddPill").textContent = "CDD: " + (data.cdd || data.CDD || "—");
      $("desc").textContent = data.resumo || data.description || data.obs || "—";

      const pdf = data.pdf_url || data.pdf || data.url_pdf || "";
      if (pdf){
        $("btnAbrirPdf").style.display = "inline-block";
        $("btnAbrirPdf").addEventListener("click", () => location.assign(pdf));
      }
    }

    async function reserve(){
      setStatus("", "");
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        setStatus("Para reservar, você precisa entrar na sua conta.", "warn");
        return location.assign(ROUTES.CADASTRO);
      }

      const reservasTable = await pickFirstExistingTable(["reservas"]);
      if (!reservasTable) return setStatus("Tabela de reservas não encontrada.", "bad");

      $("btnReservar").disabled = true;
      try{
        const { error } = await supabase.from(reservasTable).insert({ user_id: session.user.id, bib_ref });
        if (error){
          // duplicata típica (já reservado)
          return setStatus("Não foi possível reservar: " + error.message, "warn");
        }
        setStatus("Reserva registrada. Se necessário, acompanhe em “Minha conta”.", "ok");
      } finally {
        $("btnReservar").disabled = false;
      }
    }

    $("btnReservar").addEventListener("click", reserve);
    await loadBook();
  </script>
</body>
</html>
